services:
  - type: web
    name: state-shift-logger
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        value: /opt/render/project/src/state_shift_logger.sqlite3
      - key: CREATE_OMI_MEMORY_ON_EXPLICIT_LOG
        value: "true"
      - key: CREATE_OMI_MEMORY_ON_HIGH_CONFIDENCE
        value: "false"
